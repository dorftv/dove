services:
  dove:
    entrypoint: python3 main.py --config /app/config.toml
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /tmp/.X11-unix:/tmp/.X11-unix
#    environment:
#      - WPE_USE_DMA_BUF=0
#      - LIBGL_ALWAYS_SOFTWARE=true
#      - LOG_LEVEL=debug
#      - GST_DEBUG=2
#      - ANNOUNCED_IP=127.0.0.1
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - 5000:5000
      - 7777:7777/udp
      - 10000-10100:10000-10100/udp
    networks:
      - dove
    security_opt:
      - "apparmor=unconfined"
      - "seccomp=unconfined"
    cap_add:
     - SYS_ADMIN
     - CAP_NET_ADMIN
    deploy:
      resources:
        limits:
          memory: 8096M

networks:
  dove:

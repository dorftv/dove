[preview]
# fps = 15  # initial preview framerate (runtime tunable via UI 1-60)

[preview.inputs]
type=["webrtcbin", "hlssink2"]
width=320
height=180
video_encoder.name = "auto"

[preview.scenes]
type=["webrtcbin", "hlssink2"]
width=640
height=360
video_encoder.name = "auto"

[preview.program]
type=["webrtcbin", "hlssink2"]
width=640
height=360
video_encoder.name = "auto"

[webrtc]
# stun_server = "stun://stun.l.google.com:19302"
# turn_server = "turn://edge3.edge.cdn.dorftv.at"
# turn_user = "AUTH_SECRET"
# turn_password = "dorfturner"
# announced_ip = "192.168.178.47"  # Or use ANNOUNCED_IP env var
min_rtp_port = 10000
max_rtp_port = 10100

[main]

# Stream types
enable_video = true
enable_audio = true

# Video
default_resolution = "HD720"
default_framerate = "30/1"

# Audio
volume = 0.7

# HTML rendering engine
html_engine = "wpesrc"
audio_format = "F32LE"
audio_rate = 48000
audio_channels = 2

hls_path = "/var/dove/hls"
recordings_path = "/var/dove/recordings"


#preview settings
preview_format = "hls" # | webrtc
preview_resolution = "SmallPreview"
preview_enabled = true


[resolutions."QHD"]
{width = 2560, height = 1440}
[resolutions."FullHD"]
{width = 1920, height = 1080}
[resolutions."WSXGA"]
{width = 1600, height = 900}
[resolutions."WXGA"]
{width = 1366, height =  768}
[resolutions."HD720"]
{width = 1280, height = 720}
[resolutions."WSVGA"]
{width = 1024, height = 576}
[resolutions."qHD"]
{width = 960, height = 540}
[resolutions."nHD"]
{width = 640, height = 360}
[resolutions."Preview"]
{width = 480, height = 270}
[resolutions."SmallPreview"]
{width = 320, height = 180}


[ui]
add_input = true
add_scene = true
add_output = true
input_preview_auto= true
enabled_inputs = ["uridecodebin3", "playlist", "wpesrc", "ytdlp", "testsrc", "nodecg", "v4l2src", "imagesrc", "whip"]



[proxy.v4l2]
type = "v4l2src"
field = "device"

[proxy.alsa]
type = "v4l2src"
field = "audio_device"

[proxy.nodecg]
# url = "http://nodecg:9090"  # or env: NODECG_URL

[auth]
enabled = false
# issuer = "https://auth.example.com/realms/dove"
# client_id = "dove-app"
# client_secret = ""
# cookie_secret = ""  # auto-generated if not set (sessions lost on restart)
# cookie_secure = true  # set false for local HTTP dev
# allowed_origins = []  # trusted redirect origins, e.g. ["http://localhost:3000"]

# Static API tokens for scripts (no OIDC provider needed)
# [[auth.api_tokens]]
# token = "your-secret-here"
# name = "admin-scripts"
# role = "admin"  # default is "user"; set to "admin" only for trusted scripts

# Entity names whose previews are accessible without authentication
public_previews = []

[auth.groups]
user = "dove-user"
supervisor = "dove-supervisor"
outputs = "dove-outputs"
admin = "dove-admin"

[scenes]
fallback_pattern = 2  # 0=SMPTE bars (debug), 2=black (production)


[inputs]


[outputs]


services:
  dove:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
#    environment:
#      - LOG_LEVEL=debug
#      - GST_DEBUG=2
#      - ANNOUNCED_IP=127.0.0.1
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - 5000:5000
      - 7777:7777/udp
      - 10000-10100:10000-10100/udp
    networks:
      - dove
    deploy:
      resources:
        limits:
          memory: 8096M

networks:
  dove:
